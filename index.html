<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Ti</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow:hidden;
}

/* CONTENIDO */

.container{
position:relative;
z-index:2;
max-width:850px;
padding:40px;
}

h1{
font-weight:300;
letter-spacing:3px;
}

/* CONTADOR */

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.time-box{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:12px;
min-width:70px;
}

.time-box span{
display:block;
font-size:30px;
font-weight:600;
}

/* VIDEOS */

.video-section{
margin-top:40px;
opacity:0;
transform:translateY(20px);
transition:all 1.5s;
}

.visible{
opacity:1;
transform:translateY(0);
}

iframe{
margin-top:20px;
border-radius:10px;
}

/* REPRODUCTOR */

.player{
margin-top:40px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
display:flex;
align-items:center;
gap:20px;
}

.album{
width:60px;
height:60px;
border-radius:8px;
background-size:cover;
background-position:center;
}

.song-info{
flex:1;
text-align:left;
}

.controls button{
background:none;
border:1px solid white;
color:white;
padding:6px 12px;
margin-right:5px;
cursor:pointer;
border-radius:6px;
}

.controls button:hover{
background:white;
color:black;
}

.progress{
width:100%;
height:5px;
background:#333;
margin-top:10px;
border-radius:4px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:white;
}

/* ESPACIO */

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* estrellas */

.space::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.2;
animation:starsMove 120s linear infinite;
}

@keyframes starsMove{
from{transform:translateY(0)}
to{transform:translateY(-1000px)}
}

/* sol */

.sun{
position:absolute;
top:50%;
left:50%;
width:80px;
height:80px;
margin-left:-40px;
margin-top:-40px;
background:radial-gradient(circle,#ffd27f,#ff7b00);
border-radius:50%;
box-shadow:0 0 60px rgba(255,170,0,0.8);
}

/* orbitas */

.orbit{
position:absolute;
top:50%;
left:50%;
border:1px solid rgba(255,255,255,0.08);
border-radius:50%;
transform:translate(-50%,-50%);
}

.mercury-orbit{width:140px;height:140px;animation:orbit 10s linear infinite;}
.venus-orbit{width:220px;height:220px;animation:orbit 18s linear infinite;}
.earth-orbit{width:320px;height:320px;animation:orbit 26s linear infinite;}
.saturn-orbit{width:420px;height:420px;animation:orbit 40s linear infinite;}

@keyframes orbit{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

.planet{
position:absolute;
top:-6px;
left:50%;
transform:translateX(-50%);
border-radius:50%;
}

.mercury{width:8px;height:8px;background:#aaa;}
.venus{width:12px;height:12px;background:#ffd6a5;}

.earth{
width:14px;
height:14px;
background:#6ec1ff;
position:relative;
}

/* luna */

.moon-orbit{
position:absolute;
width:30px;
height:30px;
top:-8px;
left:-8px;
animation:orbit 4s linear infinite;
}

.moon{
width:4px;
height:4px;
background:white;
border-radius:50%;
position:absolute;
top:0;
left:50%;
}

/* saturno */

.saturn{
width:18px;
height:18px;
background:#d9c59a;
position:relative;
}

.ring{
position:absolute;
width:28px;
height:6px;
background:rgba(255,255,255,0.3);
border-radius:50%;
top:6px;
left:-5px;
transform:rotate(20deg);
}

/* estrellas fugaces */

.shooting-star{
position:absolute;
top:20%;
left:-200px;
width:3px;
height:3px;
background:white;
box-shadow:0 0 6px white;
animation:shoot 8s linear infinite;
}

.star2{
top:60%;
animation-delay:4s;
}

@keyframes shoot{

0%{transform:translateX(0) translateY(0);opacity:1;}

100%{transform:translateX(120vw) translateY(40vh);opacity:0;}

}

</style>
</head>

<body>

<div class="space">

<div class="sun"></div>

<div class="orbit mercury-orbit">
<div class="planet mercury"></div>
</div>

<div class="orbit venus-orbit">
<div class="planet venus"></div>
</div>

<div class="orbit earth-orbit">
<div class="planet earth">
<div class="moon-orbit">
<div class="moon"></div>
</div>
</div>
</div>

<div class="orbit saturn-orbit">
<div class="planet saturn">
<div class="ring"></div>
</div>
</div>

<div class="shooting-star"></div>
<div class="shooting-star star2"></div>

</div>

<div class="container">

<h1>Para el centro del universo</h1>

<div id="countdown" class="countdown"></div>

<div id="video1Section" class="video-section"></div>
<div id="video2Section" class="video-section"></div>

<div class="player">

<div id="albumArt" class="album"></div>

<div class="song-info">

<div id="songTitle"></div>

<div class="controls">
<button onclick="togglePlay()">Play</button>
<button onclick="nextTrack()">Next</button>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

/* FECHAS */

const firstDate=new Date("2026-03-24T15:15:00-04:00").getTime();
const secondDate=new Date("2026-04-29T08:00:00-04:00").getTime();

/* PLAYLIST */

const playlist=[

{
title:"Un Millón Como Tú - Lasso & Cami",
file:"Lasso_ Cami - Un Millón Como Tú(MP3_70K).mp3",
cover:"dos.jfif"
},

{
title:"OneRepublic - Beautiful Colors",
file:"OneRepublic - Beautiful Colors - from Kaiju No. 8 [Official Music Video](MP3_160K).mp3",
cover:"uno.jfif"
},

{
title:"La Separación [Angie Vázquez]",
file:"La Separación [Angie Vázquez] (letra _ lyrics)(MP3_70K).mp3",
cover:"unnamed.jpg"
},

{
title:"Ela Taubert - ¿Cómo Pasó?",
file:"Ela Taubert - ¿Cómo Pasó_ (Official Video)(MP3_70K).mp3",
cover:"descarga.jfif"
}

];

/* AUDIO */

const audio=document.getElementById("audio");
const songTitle=document.getElementById("songTitle");
const albumArt=document.getElementById("albumArt");
const progressBar=document.getElementById("progressBar");

let track=0;

function loadTrack(i){

audio.src=playlist[i].file;
songTitle.innerText=playlist[i].title;
albumArt.style.backgroundImage=`url(${playlist[i].cover})`;

audio.play().catch(()=>{});

}

function togglePlay(){

if(audio.paused){audio.play();}
else{audio.pause();}

}

function nextTrack(){

track=(track+1)%playlist.length;

loadTrack(track);

}

audio.addEventListener("timeupdate",function(){

const percent=(audio.currentTime/audio.duration)*100;
progressBar.style.width=percent+"%";

});

audio.addEventListener("ended",nextTrack);

loadTrack(track);

/* CONTADOR */

const countdown=document.getElementById("countdown");

let video1Shown=false;
let video2Shown=false;

setInterval(function(){

const now=new Date().getTime();

let distance;

if(now<firstDate){

distance=firstDate-now;

renderCountdown(distance);

}

else if(now>=firstDate && now<secondDate){

if(!video1Shown){

document.getElementById("video1Section").innerHTML=`

<h2>Primera sorpresa</h2>

<iframe width="560" height="315"
src="https://github.com/rafaelshi4091-stack/cuenta_regresiva"
allowfullscreen></iframe>

`;

document.getElementById("https://youtu.be/q-s3tfNRPiE?si=5loGo08KMkWj893X").classList.add("visible");

video1Shown=true;

}

distance=secondDate-now;

renderCountdown(distance);

}

else{

if(!video2Shown){

document.getElementById("https://youtu.be/q-s3tfNRPiE?si=5loGo08KMkWj893X").innerHTML=`

<h2>Segunda sorpresa</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEO2"
allowfullscreen></iframe>

`;

document.getElementById("video2Section").classList.add("visible");

video2Shown=true;

}

}

},1000);

function renderCountdown(d){

const days=Math.floor(d/(1000*60*60*24));
const hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((d%(1000*60*60))/(1000*60));
const seconds=Math.floor((d%(1000*60))/1000);

countdown.innerHTML=`

<div class="time-box"><span>${days}</span>Días</div>
<div class="time-box"><span>${hours}</span>Horas</div>
<div class="time-box"><span>${minutes}</span>Min</div>
<div class="time-box"><span>${seconds}</span>Seg</div>

`;

}

</script>

</body>
</html>
