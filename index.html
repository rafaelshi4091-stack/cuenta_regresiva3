<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Ti</title>

<style>

body{
margin:0;
font-family:Helvetica, Arial, sans-serif;
background:#f7f7f7;
color:#222;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
max-width:800px;
padding:40px;
}

h1{
font-weight:300;
letter-spacing:2px;
}

.countdown{
font-size:28px;
margin-top:20px;
letter-spacing:1px;
}

.video-section{
margin-top:40px;
opacity:0;
transition:opacity 1.5s ease;
}

.visible{
opacity:1;
}

iframe{
margin-top:20px;
border-radius:6px;
}

.divider{
margin:60px 0;
height:1px;
background:#ddd;
}

/* reproductor */

.music-player{
margin-top:40px;
padding:20px;
border-top:1px solid #ddd;
}

.song-title{
font-size:16px;
margin-bottom:10px;
}

.controls button{
padding:8px 18px;
margin:5px;
border:1px solid #222;
background:transparent;
cursor:pointer;
}

.controls button:hover{
background:#222;
color:white;
}

.progress{
width:100%;
height:6px;
background:#eee;
margin-top:15px;
border-radius:4px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#222;
}

</style>
</head>

<body>

<div class="container">

<h1>Algo especial está por llegar</h1>

<div id="mainCountdown" class="countdown"></div>

<div id="video1Section" class="video-section"></div>

<div id="video2Section" class="video-section"></div>

<!-- reproductor -->

<div class="music-player">

<div id="songTitle" class="song-title">
Cargando música...
</div>

<div class="controls">
<button onclick="togglePlay()">Play / Pause</button>
<button onclick="nextTrack()">Siguiente</button>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

</div>

<audio id="bgMusic"></audio>

<script>

/* -----------------------------
CONFIGURACIÓN
----------------------------- */

const firstDate = new Date("2026-03-29T08:00:00-04:00").getTime();

const secondDate = new Date("2026-04-29T08:00:00-04:00").getTime();

/* playlist */

const playlist = [

{
title:"Un Millón Como Tú - Lasso & Cami",
file:"Lasso_ Cami - Un Millón Como Tú(MP3_70K).mp3"
}

];

/* elementos */

const mainCountdown=document.getElementById("mainCountdown");
const video1Section=document.getElementById("video1Section");
const video2Section=document.getElementById("video2Section");

const audioPlayer=document.getElementById("bgMusic");

const songTitle=document.getElementById("songTitle");
const progressBar=document.getElementById("progressBar");

/* música */

let currentTrack=0;

audioPlayer.volume=0.4;

function loadTrack(index){

audioPlayer.src=playlist[index].file;

songTitle.innerText=playlist[index].title;

audioPlayer.play().catch(()=>{
console.log("Autoplay bloqueado por navegador");
});

}

function togglePlay(){

if(audioPlayer.paused){

audioPlayer.play();

}else{

audioPlayer.pause();

}

}

function nextTrack(){

currentTrack=(currentTrack+1)%playlist.length;

loadTrack(currentTrack);

}

audioPlayer.addEventListener("timeupdate",function(){

const percent=(audioPlayer.currentTime/audioPlayer.duration)*100;

progressBar.style.width=percent+"%";

});

audioPlayer.addEventListener("ended",function(){

nextTrack();

});

loadTrack(currentTrack);

/* -----------------------------
CONTADOR
----------------------------- */

let video1Shown=false;
let video2Shown=false;

const timer=setInterval(function(){

const now=new Date().getTime();

if(now<firstDate){

updateCountdown(firstDate-now,"Primera sorpresa en");

}

else if(now>=firstDate && now<secondDate){

if(!video1Shown){

mainCountdown.innerHTML="";

video1Section.innerHTML=`

<h2>Primera sorpresa</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEO1"
frameborder="0"
allowfullscreen>
</iframe>

<div class="divider"></div>

<div id="secondCountdown" class="countdown"></div>

`;

video1Section.classList.add("visible");

video1Shown=true;

}

updateSecondCountdown(secondDate-now);

}

else if(now>=secondDate){

if(!video2Shown){

video2Section.innerHTML=`

<h2>Segunda sorpresa</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEO2"
frameborder="0"
allowfullscreen>
</iframe>

`;

video2Section.classList.add("visible");

video2Shown=true;

}

clearInterval(timer);

}

},1000);

/* funciones */

function updateCountdown(distance,text){

mainCountdown.innerHTML=text+"<br><br>"+formatTime(distance);

}

function updateSecondCountdown(distance){

document.getElementById("secondCountdown").innerHTML="Segunda sorpresa en<br><br>"+formatTime(distance);

}

function formatTime(distance){

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

return days+"d "+hours+"h "+minutes+"m "+seconds+"s";

}

</script>

</body>
</html>
