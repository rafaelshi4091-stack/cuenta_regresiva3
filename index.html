<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Ti</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow:hidden;
}

.container{
position:relative;
z-index:2;
max-width:850px;
padding:40px;
}

h1{
font-weight:300;
letter-spacing:3px;
}

/* CONTADOR */

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.time-box{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:12px;
min-width:70px;
}

.time-box span{
display:block;
font-size:30px;
font-weight:600;
}

/* VIDEOS */

.video-section{
margin-top:40px;
opacity:0;
transform:translateY(20px);
transition:all 1.5s;
}

.visible{
opacity:1;
transform:translateY(0);
}

/* BOTÓN VIDEO */

.video-btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
font-size:16px;
border-radius:30px;
background:linear-gradient(135deg,#ff7b00,#ffb347);
color:white;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
transition:all 0.3s ease;
box-shadow:0 0 15px rgba(255,140,0,0.6);
}

.video-btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,140,0,0.9);
}

/* REPRODUCTOR */

.player{
margin-top:40px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
display:flex;
align-items:center;
gap:20px;
}

.album{
width:60px;
height:60px;
border-radius:8px;
background-size:cover;
background-position:center;
}

.song-info{
flex:1;
text-align:left;
}

.controls button{
background:none;
border:1px solid white;
color:white;
padding:6px 12px;
margin-right:5px;
cursor:pointer;
border-radius:6px;
}

.controls button:hover{
background:white;
color:black;
}

.progress{
width:100%;
height:5px;
background:#333;
margin-top:10px;
border-radius:4px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:white;
}

/* FONDO ESPACIO (simplificado para no hacerlo eterno) */

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.space::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.2;
animation:starsMove 120s linear infinite;
}

@keyframes starsMove{
from{transform:translateY(0)}
to{transform:translateY(-1000px)}
}

</style>
</head>

<body>

<div class="space"></div>

<div class="container">

<h1>Para el centro del universo</h1>

<div id="countdown" class="countdown"></div>

<div id="video1Section" class="video-section"></div>
<div id="video2Section" class="video-section"></div>

<!-- REPRODUCTOR -->
<div class="player">

<div id="albumArt" class="album"></div>

<div class="song-info">

<div id="songTitle"></div>

<div class="controls">
<button onclick="togglePlay()">Play</button>
<button onclick="nextTrack()">Next</button>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

/* FECHAS */

const firstDate=new Date("2026-04-29T14:00:00-04:00").getTime();
const secondDate=new Date("2026-05-29T14:00:00-04:00").getTime();

/* PLAYLIST */

const playlist=[

{
title:"Un Millón Como Tú",
file:"tu_audio1.mp3",
cover:"img1.jpg"
},

{
title:"Beautiful Colors",
file:"tu_audio2.mp3",
cover:"img2.jpg"
}

];

/* AUDIO */

const audio=document.getElementById("audio");
const songTitle=document.getElementById("songTitle");
const albumArt=document.getElementById("albumArt");
const progressBar=document.getElementById("progressBar");

let track=0;

function loadTrack(i){
audio.src=playlist[i].file;
songTitle.innerText=playlist[i].title;
albumArt.style.backgroundImage=`url(${playlist[i].cover})`;
audio.play().catch(()=>{});
}

function togglePlay(){
audio.paused ? audio.play() : audio.pause();
}

function nextTrack(){
track=(track+1)%playlist.length;
loadTrack(track);
}

audio.addEventListener("timeupdate",function(){
const percent=(audio.currentTime/audio.duration)*100;
progressBar.style.width=percent+"%";
});

audio.addEventListener("ended",nextTrack);

loadTrack(track);

/* CONTADOR + BOTONES */

const countdown=document.getElementById("countdown");

let video1Shown=false;
let video2Shown=false;

setInterval(function(){

const now=new Date().getTime();

let distance;

if(now<firstDate){

distance=firstDate-now;
renderCountdown(distance);

}

else if(now>=firstDate && now<secondDate){

if(!video1Shown){

document.getElementById("video1Section").innerHTML=`
<h2>Primera sorpresa</h2>
<a href="https://youtube.com/shorts/xAtgIKRWfM8?si=kMEDwKJcDHJ3R-YL" target="_blank" class="video-btn">
Ver sorpresa 💫
</a>
`;

document.getElementById("video1Section").classList.add("visible");
video1Shown=true;

}

distance=secondDate-now;
renderCountdown(distance);

}

else{

if(!video2Shown){

document.getElementById("video2Section").innerHTML=`
<h2>Segunda sorpresa</h2>
<a href="https://www.youtube.com/watch?v=VIDEO2" target="_blank" class="video-btn">
Ver segunda sorpresa ✨
</a>
`;

document.getElementById("video2Section").classList.add("visible");
video2Shown=true;

}

}

},1000);

function renderCountdown(d){

const days=Math.floor(d/(1000*60*60*24));
const hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((d%(1000*60*60))/(1000*60));
const seconds=Math.floor((d%(1000*60))/1000);

countdown.innerHTML=`
<div class="time-box"><span>${days}</span>Días</div>
<div class="time-box"><span>${hours}</span>Horas</div>
<div class="time-box"><span>${minutes}</span>Min</div>
<div class="time-box"><span>${seconds}</span>Seg</div>
`;

}

</script>

</body>
</html>
