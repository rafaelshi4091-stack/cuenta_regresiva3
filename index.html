<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Ti</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0b0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow:hidden;
}

/* estrellas */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.15;
animation:stars 60s linear infinite;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-1000px)}
}

.container{
max-width:850px;
padding:40px;
position:relative;
z-index:1;
}

h1{
font-weight:300;
letter-spacing:3px;
margin-bottom:20px;
}

/* contador */

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
font-size:26px;
}

.time-box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
min-width:80px;
}

.time-box span{
display:block;
font-size:32px;
font-weight:600;
}

.video-section{
margin-top:40px;
opacity:0;
transform:translateY(20px);
transition:all 1.5s;
}

.visible{
opacity:1;
transform:translateY(0);
}

iframe{
margin-top:20px;
border-radius:10px;
}

/* reproductor */

.player{
margin-top:50px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
display:flex;
align-items:center;
gap:20px;
}

.album{
width:60px;
height:60px;
border-radius:8px;
background-size:cover;
background-position:center;
}

.song-info{
flex:1;
text-align:left;
}

.song-title{
font-size:16px;
}

.controls button{
background:none;
border:1px solid white;
color:white;
padding:6px 12px;
margin-right:5px;
cursor:pointer;
border-radius:6px;
}

.controls button:hover{
background:white;
color:black;
}

.progress{
width:100%;
height:5px;
background:#333;
margin-top:10px;
border-radius:4px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:white;
}

</style>
</head>

<body>

<div class="container">

<h1>Algo especial está por llegar</h1>

<div id="countdown" class="countdown"></div>

<div id="video1Section" class="video-section"></div>
<div id="video2Section" class="video-section"></div>

<div class="player">

<div id="albumArt" class="album"></div>

<div class="song-info">

<div id="songTitle" class="song-title"></div>

<div class="controls">
<button onclick="togglePlay()">Play</button>
<button onclick="nextTrack()">Next</button>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

/* fechas */

const firstDate=new Date("2026-03-29T08:00:00-04:00").getTime();
const secondDate=new Date("2026-04-29T08:00:00-04:00").getTime();

/* playlist */

const playlist=[

{
title:"Un Millón Como Tú - Lasso & Cami",
file:"Lasso_ Cami - Un Millón Como Tú(MP3_70K).mp3",
cover:"dos.jfif"
},

{
title:"OneRepublic - Beautiful Colors",
file:"OneRepublic - Beautiful Colors - from Kaiju No. 8 [Official Music Video](MP3_160K).mp3",
cover:"uno.jfif"
}

];

/* elementos */

const audio=document.getElementById("audio");
const songTitle=document.getElementById("songTitle");
const albumArt=document.getElementById("albumArt");
const progressBar=document.getElementById("progressBar");

let track=0;

/* cargar canción */

function loadTrack(i){

audio.src=playlist[i].file;

songTitle.innerText=playlist[i].title;

albumArt.style.backgroundImage=`url(${playlist[i].cover})`;

audio.play().catch(()=>{});

}

function togglePlay(){

if(audio.paused){
audio.play();
}else{
audio.pause();
}

}

function nextTrack(){

track=(track+1)%playlist.length;

loadTrack(track);

}

audio.addEventListener("timeupdate",function(){

const percent=(audio.currentTime/audio.duration)*100;

progressBar.style.width=percent+"%";

});

audio.addEventListener("ended",nextTrack);

loadTrack(track);

/* contador */

const countdown=document.getElementById("countdown");

let video1Shown=false;
let video2Shown=false;

setInterval(function(){

const now=new Date().getTime();

let distance;

if(now<firstDate){

distance=firstDate-now;

renderCountdown(distance);

}

else if(now>=firstDate && now<secondDate){

if(!video1Shown){

document.getElementById("video1Section").innerHTML=`

<h2>Primera sorpresa</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEO1"
allowfullscreen></iframe>

`;

document.getElementById("video1Section").classList.add("visible");

video1Shown=true;

}

distance=secondDate-now;

renderCountdown(distance);

}

else{

if(!video2Shown){

document.getElementById("video2Section").innerHTML=`

<h2>Segunda sorpresa</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEO2"
allowfullscreen></iframe>

`;

document.getElementById("video2Section").classList.add("visible");

video2Shown=true;

}

}

},1000);

function renderCountdown(d){

const days=Math.floor(d/(1000*60*60*24));
const hours=Math.floor((d%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((d%(1000*60*60))/(1000*60));
const seconds=Math.floor((d%(1000*60))/1000);

countdown.innerHTML=`

<div class="time-box"><span>${days}</span>Días</div>
<div class="time-box"><span>${hours}</span>Horas</div>
<div class="time-box"><span>${minutes}</span>Min</div>
<div class="time-box"><span>${seconds}</span>Seg</div>

`;

}

</script>

</body>
</html>
